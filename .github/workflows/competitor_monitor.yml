name: Competitor Intelligence Monitor

on:
  schedule:
    - cron: '0 14 * * *'  # 6 AM Pacific daily (2 PM UTC)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r competitor_monitor/requirements.txt

      - run: python competitor_monitor/competitor_monitor.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signals-db-${{ github.run_id }}
          path: competitor_monitor/data/signals.db
          retention-days: 30
