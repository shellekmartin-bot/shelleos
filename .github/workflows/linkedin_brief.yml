name: LinkedIn Brief Generator

on:
  schedule:
    - cron: '0 11 * * 1,4'  # 4 AM Pacific every Monday and Thursday
  workflow_dispatch:
    inputs:
      persona:
        description: 'Which persona to run'
        required: true
        default: 'all'
        type: choice
        options:
          - 'shelle'
          - 'beth'
          - 'shane'
          - 'all'

jobs:
  generate-briefs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic==0.86.0 httpx requests python-dotenv

      - name: Run Shelle brief
        if: github.event_name == 'schedule' || github.event.inputs.persona == 'shelle' || github.event.inputs.persona == 'all'
        run: python LinkedIn/linkedin_brief.py
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Run Beth brief
        if: github.event_name == 'schedule' || github.event.inputs.persona == 'beth' || github.event.inputs.persona == 'all'
        run: python LinkedIn/linkedin_brief_beth.py
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}

          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Run Shane brief
        if: github.event_name == 'schedule' || github.event.inputs.persona == 'shane' || github.event.inputs.persona == 'all'
        run: python LinkedIn/linkedin_brief_shane.py
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}

          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-briefs-${{ github.run_id }}
          path: LinkedIn/*_output.txt
          retention-days: 30
